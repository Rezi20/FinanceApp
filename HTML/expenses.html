<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Expense Overview</title>

<link rel="stylesheet" href="../CSS/expenses.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="layout">

    <!-- MENU -->
    <div class="menu">

        <div class="menu-title">MY WALLET</div>

        <a href="../HTML/dashboard.html" class="menu-item">Dashboard</a>
        <a href="../HTML/income.html" class="menu-item">Income</a>
        <a href="../HTML/expenses.html" class="menu-item active">Expenses</a>
        <a href="../HTML/categories.html" class="menu-item">Categories</a>
        <a href="../HTML/report.html" class="menu-item">Report</a>

        <div class="menu-bottom">
            <a class="menu-item logout" href="../index.html">Logout</a>
        </div>

    </div>

    <!-- MAIN -->
    <div class="main-content">

        <div class="container">

            <h1>Expense Overview</h1>

            <br><br><br>

            <button class="add-btn" id="openModal">
                Add Expense
            </button>

            <div class="stats">

                <div class="stat-box">
                    <div>Total Expenses</div>
                    <div id="totalExpenses">$0</div>
                </div>

                <div class="stat-box">
                    <div>Average Expenses</div>
                    <div id="avgExpenses">$0</div>
                </div>

                <div class="stat-box">
                    <div>Number of Expenses</div>
                    <div id="countExpenses">0</div>
                </div>

            </div>

            <div class="chart-container">
                <canvas id="expenseChart"></canvas>
            </div>

            <table>

                <thead>
                    <tr>
                        <th>Description</th>
                        <th>Amount</th>
                        <th>Category</th>
                        <th>Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>

                <tbody id="expenseList"></tbody>

            </table>

        </div>

        <!-- SIDEBAR -->
        <div class="sidebar">

            <div class="chart-container">
                <canvas id="expensePieChart"></canvas>
            </div>

            <div class="category-box">

                <div class="category-title">
                    Expenses by Category
                </div>

                <div id="categoryList"></div>

            </div>

        </div>

    </div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">

    <div class="modal-content">

        <input type="hidden" id="editIndex">

        <div class="input-group">
            <input id="description" placeholder="Description">
        </div>

        <div class="input-group">
            <input id="amount" type="number" placeholder="Amount">
        </div>

        <div class="input-group">

            <select id="category">

                <option value="Travel">Travel</option>
                <option value="Transport">Transport</option>
                <option value="Shopping">Shopping</option>
                <option value="Health & Medical">Health & Medical</option>
                <option value="Health & Fitness">Gym & Fitness</option>
                <option value="Food">Food</option>
                <option value="Technology">Technology</option>
                <option value="Bills">Bills</option>
                <option value="Entertainment">Entertainment</option>

            </select>

        </div>

        <div class="input-group">
            <input id="date" type="date">
        </div>

        <button class="submit-btn" id="saveBtn">
            Add
        </button>

    </div>

</div>

<script src="../JavaScript/expenses.js"></script>

</body>
</html>
