<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <script type="module" src="./JavaScript/LoginPage.js" defer></script>
  <title>My Finance</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body.login-page {
      font-family: Arial, sans-serif;
      height: 100vh;
      display: flex;
      overflow: hidden;
      background: #eef4ff;
    }

    /* LEFT SIDE IMAGE */
    .image-section {
      width: 50%;
      background: url("logoLogin.jpg") center/cover no-repeat;
      position: relative;
    }

    /* RIGHT SIDE FORM */
    .form-section {
      width: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #ffffff;
      padding: 40px;
    }

    .login-container {
      background: #ffffff;
      padding: 40px;
      border-radius: 20px;
      width: 380px;
      border: 1px solid #dbe9ff;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
    }

    .logo-title {
      text-align: center;
      margin-bottom: 10px;
      font-size: 40px;
      color: #2c4a6b;
      font-weight: bold;
      padding: 20px;
    }

    h2 {
      margin-bottom: 30px;
      color: #4a6785;
      text-align: center;
      font-size: 20px;
    }

    .input-group {
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
    }

    label {
      margin-bottom: 8px;
      font-size: 14px;
      color: #2c4a6b;
      font-weight: 600;
    }

    input {
      width: 100%;
      padding: 13px;
      border: 1px solid #dbe9ff;
      border-radius: 10px;
      font-size: 14px;
      outline: none;
      background: #ffffff;
      transition: 0.2s;
    }

    input:focus {
      border-color: #4a90e2;
      box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.15);
    }

    button {
      width: 100%;
      padding: 13px;
      background: #4a90e2;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 10px;
      font-weight: bold;
    }

    button:hover {
      background: #357bd8;
    }

    @media (max-width: 900px) {
      .image-section {
        display: none;
      }

      .form-section {
        width: 100%;
      }
    }
  </style>
</head>

<body class="login-page">

  <!-- LEFT SIDE -->
  <div class="image-section"></div>

  <!-- RIGHT SIDE -->
  <div class="form-section">
    <div class="login-container">

      <div class="logo-title">My Wallet</div>

      <h2>Create Account</h2>

      <form>
        <div class="input-group">
          <label for="name">Name</label>
          <input type="text" id="name" placeholder="Enter your name" required />
        </div>

        <div class="input-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="Enter your email" required />
        </div>

        <div class="input-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" required />
        </div>

        <button type="submit" id="submit">
          Create Account
        </button>
      </form>

    </div>
  </div>

</body>
</html>
