<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Income Overview</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        background: #eef4ff;
    }

    .layout {
        display: flex;
        min-height: 100vh;
    }

    /* ===== FIXED LEFT MENU ===== */
    .menu {
        position: fixed;
        left: 0;
        top: 0;
        width: 220px;
        height: 100vh;
        background: #ffffff;
        padding: 30px 20px;
        display: flex;
        flex-direction: column;
        border-right: 1px solid #dbe9ff;
    }

    .menu-title {
        font-size: 24px;
        font-weight: bold;
        color: #2c4a6b;
        margin-bottom: 40px;
    }

    .menu-item {
        padding: 14px 16px;
        border-radius: 10px;
        margin-bottom: 10px;
        cursor: pointer;
        color: #2c4a6b;
        transition: 0.2s;
        font-weight: 500;
    }

    .menu-item:hover {
        background: #f0f6ff;
    }

    .menu-item.active {
        background: #4a90e2;
        color: white;
    }

    .menu-bottom {
        margin-top: auto;
    }

    .logout {
        color: #d64545;
    }

    .logout:hover {
        background: #ffe9e9;
    }

    /* ===== MAIN CONTENT ===== */
    .main-content {
        flex: 1;
        margin-left: 220px;
        padding: 40px;
        display: flex;
        gap: 20px;
        align-items: flex-start;
    }

    .container {
        flex: 1;
    }

    h1 {
        margin-bottom: 20px;
        color: #2c4a6b;
    }

    .add-btn {
        padding: 12px 18px;
        background: #4a90e2;
        color: white;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        margin-bottom: 20px;
    }

    .add-btn:hover {
        background: #357bd8;
    }

    .stats {
        display: flex;
        gap: 12px;
        margin-bottom: 50px;
    }

    .stat-box {
        flex: 1;
        background: white;
        padding: 16px;
        border-radius: 12px;
        text-align: center;
        border: 1px solid #dbe9ff;
    }

    .stat-box div:first-child {
        color: #666;
        margin-bottom: 8px;
    }

    .stat-box div:last-child {
        color: #ff9f50;
        font-weight: bold;
        font-size: 20px;
    }

    .chart-container {
        background: white;
        padding: 20px;
        border-radius: 12px;
        margin-bottom: 30px;
        border: 1px solid #dbe9ff;
    }

    .category-box {
        background: white;
        padding: 55px;
        border-radius: 12px;
        border: 1px solid #dbe9ff;
    }

    .category-title {
        font-weight: bold;
        margin-bottom: 12px;
        color: #2c4a6b;
    }

    .category-row {
        display: flex;
        justify-content: space-between;
        padding: 8px 0;
        border-bottom: 1px solid #eee;
        font-size: 14px;
    }

    .sidebar {
        display: flex;
        flex-direction: column;
        gap: 20px;
        width: 320px;
        margin-top: 170px;
    }

    table {
        width: 100%;
        background: white;
        border-collapse: collapse;
        border-radius: 12px;
        overflow: hidden;
        margin-bottom: 30px;
    }

    th,
    td {
        padding: 14px;
        border-bottom: 1px solid #eee;
    }

    th {
        background: #fff3e8;
    }

    tr:hover {
        background: #f9fbff;
    }

    .edit-btn,
    .delete-btn {
        border: none;
        padding: 6px 10px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 12px;
    }

    .edit-btn {
        background: #4a90e2;
        color: white;
    }

    .delete-btn {
        background: #ffd9c2;
    }

    .modal {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.4);
        display: none;
        justify-content: center;
        align-items: center;
    }

    .modal-content {
        background: white;
        padding: 20px;
        border-radius: 12px;
        width: 380px;
    }

    .input-group input {
        width: 100%;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #dbe9ff;
        margin-bottom: 10px;
    }

    .submit-btn {
        width: 100%;
        padding: 12px;
        background: #ffb26b;
        color: white;
        border: none;
        border-radius: 10px;
        cursor: pointer;
    }
</style>

</head>

<body>

<div class="layout">

    <!-- FIXED LEFT MENU -->
    <div class="menu">
    <div class="menu-title">MY WALLET</div>

    <a href="dashboard.html" class="menu-item" style="text-decoration: none;">Dashboard</a>
    <a href="income.html" class="menu-item" style="text-decoration: none;">Income</a>
    <a href="expenses.html" class="menu-item" style="text-decoration: none;">Expenses</a>
    <a href="categories.html" class="menu-item" style="text-decoration: none;">Categories</a>
    <a href="report.html" class="menu-item" style="text-decoration: none;">Report</a>

    <div class="menu-bottom">
        <a href="index.html" style="text-decoration: none;">
            <div class="menu-item logout">Logout</div>
        </a>
    </div>
</div>

    <!-- MAIN CONTENT -->
    <div class="main-content">

        <!-- LEFT -->
        <div class="container">

            <h1>Income Overview</h1>
            <br><br><br>

            <button class="add-btn" id="openModal">Add Income</button>

            <div class="stats">
                <div class="stat-box">
                    <div>Total Income</div>
                    <div id="totalIncome">$0</div>
                </div>

                <div class="stat-box">
                    <div>Average Income</div>
                    <div id="avgIncome">$0</div>
                </div>

                <div class="stat-box">
                    <div>Number of Incomes</div>
                    <div id="countIncome">0</div>
                </div>
            </div>

            <div class="chart-container">
                <canvas id="incomeChart"></canvas>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Description</th>
                        <th>Amount</th>
                        <th>Source</th>
                        <th>Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="incomeList"></tbody>
            </table>

        </div>

        <!-- RIGHT -->
        <div class="sidebar">

            <div class="chart-container">
                <canvas id="incomePieChart"></canvas>
            </div>

            <div class="category-box">
                <div class="category-title">Income by Source</div>
                <div id="categoryList"></div>
            </div>

        </div>

    </div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
    <div class="modal-content">

        <input type="hidden" id="editIndex">

        <div class="input-group">
            <input id="description" placeholder="Description">
        </div>

        <div class="input-group">
            <input id="amount" type="number" placeholder="Amount">
        </div>

        <div class="input-group">
            <input id="category" placeholder="Source">
        </div>

        <div class="input-group">
            <input id="date" type="date">
        </div>

        <button class="submit-btn" id="saveBtn">Add</button>

    </div>
</div>



</body>
</html>











































































<script>

const modal = document.getElementById("modal");
const openModal = document.getElementById("openModal");
const saveBtn = document.getElementById("saveBtn");

const incomeList = document.getElementById("incomeList");
const editIndex = document.getElementById("editIndex");

const totalIncomeEl = document.getElementById("totalIncome");
const avgIncomeEl = document.getElementById("avgIncome");
const countIncomeEl = document.getElementById("countIncome");
const categoryList = document.getElementById("categoryList");

let rowsData = [];

/* MODAL */
openModal.onclick = () => {
  editIndex.value = "";
  saveBtn.textContent = "Add";
  modal.style.display = "flex";
};

window.onclick = (e) => {
  if (e.target === modal) modal.style.display = "none";
};

/* SAVE */
saveBtn.onclick = () => {
  const description = document.getElementById("description").value;
  const amount = document.getElementById("amount").value;
  const category = document.getElementById("category").value;
  const date = document.getElementById("date").value;


  if (amount < 0) {
    alert("Amount cannot be negative.");
    return;
  }
  if (!description || !amount || !category || !date) return;

  const index = editIndex.value;

  if (index === "") {
    rowsData.push({ description, amount, category, date });
  } else {
    rowsData[index] = { description, amount, category, date };
  }

  refreshAll();
  modal.style.display = "none";
};

/* CHARTS */
const ctx = document.getElementById("incomeChart");

const chart = new Chart(ctx, {
  data: {
    labels: [],
    datasets: [
      {
        type: "bar",
        data: [],
        backgroundColor: "#ffb26b",
        barThickness: 20
      },
      {
        type: "line",
        data: [],
        borderColor: "#4a90e2",
        backgroundColor: "rgba(74, 144, 226, 0.2)",
        fill: true,
        tension: 0.5,
        pointBackgroundColor: "#4a90e2",
        pointRadius: 4
      }
    ]
  }
});

const pieCtx = document.getElementById("incomePieChart");

const pieChart = new Chart(pieCtx, {
  type: "doughnut",
  data: {
    labels: [],
    datasets: [{
      data: [],
      backgroundColor: [
        "#4a90e2",
        "#ffb26b",
        "#6fb1ff",
        "#ffd1a6",
        "#8cc4ff",
        "#ffe3cc"
      ]
    }]
  },
  options: {
    plugins: {
      tooltip: {
        callbacks: {
          label: function(context) {

            const data = context.dataset.data;
            const total = data.reduce((a, b) => a + b, 0);
            const value = data[context.dataIndex];
            const percent = ((value / total) * 100).toFixed(1);

            return `${context.label}: $${value} (${percent}%)`;
          }
        }
      }
    }
  }
});

/* TABLE */
function renderTable() {
  incomeList.innerHTML = "";

  rowsData.forEach((item, index) => {
    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${item.description}</td>
      <td>$${item.amount}</td>
      <td>${item.category}</td>
      <td>${item.date}</td>
      <td>
        <button class="edit-btn">Edit</button>
        <button class="delete-btn">Delete</button>
      </td>
    `;

    row.querySelector(".delete-btn").onclick = () => {
      rowsData.splice(index, 1);
      refreshAll();
    };

    row.querySelector(".edit-btn").onclick = () => {
      document.getElementById("description").value = item.description;
      document.getElementById("amount").value = item.amount;
      document.getElementById("category").value = item.category;
      document.getElementById("date").value = item.date;

      editIndex.value = index;
      saveBtn.textContent = "Save Changes";
      modal.style.display = "flex";
    };

    incomeList.appendChild(row);
  });
}

function updateStats() {
  const total = rowsData.reduce((s, i) => s + Number(i.amount), 0);
  const count = rowsData.length;
  const avg = count ? total / count : 0;

  totalIncomeEl.textContent = `$${total.toFixed(2)}`;
  avgIncomeEl.textContent = `$${avg.toFixed(2)}`;
  countIncomeEl.textContent = count;
}

function updateChart() {
  const sorted = [...rowsData].sort((a, b) => new Date(a.date) - new Date(b.date));

  chart.data.labels = sorted.map(i => i.description);
  chart.data.datasets[0].data = sorted.map(i => +i.amount);
  chart.data.datasets[1].data = sorted.map(i => +i.amount);
  chart.update();
}

function updateCategoryBox() {
  const map = {};

  rowsData.forEach(i => {
    map[i.category] = (map[i.category] || 0) + Number(i.amount);
  });

  const sorted = Object.entries(map).sort((a, b) => b[1] - a[1]);

  categoryList.innerHTML = "";

  sorted.forEach(([cat, total]) => {
    const row = document.createElement("div");
    row.className = "category-row";
    row.innerHTML = `<span>${cat}</span><span>$${total.toFixed(2)}</span>`;
    categoryList.appendChild(row);
  });

  pieChart.data.labels = sorted.map(i => i[0]);
  pieChart.data.datasets[0].data = sorted.map(i => i[1]);
  pieChart.update();
}

function refreshAll() {
  renderTable();
  updateStats();
  updateChart();
  updateCategoryBox();
}

const menuItems = document.querySelectorAll(".menu-item");

const currentPage = window.location.pathname.split("/").pop();

menuItems.forEach(item => {
    const itemPage = item.getAttribute("href");

    if (itemPage === currentPage) {
        item.classList.add("active");
    } else {
        item.classList.remove("active");
    }
});
</script>
