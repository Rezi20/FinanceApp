<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Expense Overview</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: #eef4ff;
}

.layout {
  display: flex;
  min-height: 100vh;
}

/* MENU */
.menu {
  position: fixed;
  left: 0;
  top: 0;
  width: 220px;
  height: 100vh;
  background: #ffffff;
  padding: 30px 20px;
  display: flex;
  flex-direction: column;
  border-right: 1px solid #dbe9ff;
}

.menu-title {
  font-size: 24px;
  font-weight: bold;
  color: #2c4a6b;
  margin-bottom: 40px;
}

.menu-item {
  padding: 14px 16px;
  border-radius: 10px;
  margin-bottom: 10px;
  cursor: pointer;
  color: #2c4a6b;
  text-decoration: none;
}

.menu-item:hover {
  background: #f0f6ff;
}

.menu-item.active {
  background: #4a90e2;
  color: white;
}

.menu-bottom {
  margin-top: auto;
}

.logout {
  color: #d64545;
}

/* MAIN */
.main-content {
  flex: 1;
  margin-left: 220px;
  padding: 40px;
  display: flex;
  gap: 20px;
  align-items: flex-start;
}

.container {
  flex: 1;
}

h1 {
  margin-bottom: 20px;
  color: #2c4a6b;
}

/* BUTTON */
.add-btn {
  padding: 12px 18px;
  background: #4a90e2;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  margin-bottom: 20px;
}

.add-btn:hover {
  background: #357bd8;
}

/* STATS */
.stats {
  display: flex;
  gap: 12px;
  margin-bottom: 50px;
}

.stat-box {
  flex: 1;
  background: white;
  padding: 16px;
  border-radius: 12px;
  text-align: center;
  border: 1px solid #dbe9ff;
}

.stat-box div:first-child {
  color: #666;
  margin-bottom: 8px;
}

.stat-box div:last-child {
  color: #ff9f50;
  font-weight: bold;
  font-size: 20px;
}

/* CHART */
.chart-container {
  background: white;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 30px;
  border: 1px solid #dbe9ff;
}

/* TABLE */
table {
  width: 100%;
  background: white;
  border-collapse: collapse;
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 30px;
}

th, td {
  padding: 14px;
  border-bottom: 1px solid #eee;
}

th {
  background: #fff3e8;
}

/* BUTTONS */
.edit-btn,
.delete-btn {
  border: none;
  padding: 6px 10px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 12px;
}

.edit-btn {
  background: #4a90e2;
  color: white;
}

.delete-btn {
  background: #ffd9c2;
}

/* SIDEBAR */
.sidebar {
  display: flex;
  flex-direction: column;
  gap: 20px;
  width: 320px;
  margin-top: 170px;
}

/* CATEGORY BOX */
.category-box {
  background: white;
  padding: 55px;
  border-radius: 12px;
  border: 1px solid #dbe9ff;
}

.category-title {
  font-weight: bold;
  margin-bottom: 12px;
  color: #2c4a6b;
}

.category-row {
  display: flex;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid #eee;
  font-size: 14px;
}

/* MODAL */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  display: none;
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: white;
  padding: 20px;
  border-radius: 12px;
  width: 380px;
}

.input-group {
  margin-bottom: 12px;
}

.input-group input,
.input-group select {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #dbe9ff;
}

.submit-btn {
  width: 100%;
  padding: 12px;
  background: #ffb26b;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="layout">

<!-- MENU -->
<div class="menu">
  <div class="menu-title">MY WALLET</div>

  <a href="dashboard.html" class="menu-item">Dashboard</a>
  <a href="income.html" class="menu-item">Income</a>
  <a href="expenses.html" class="menu-item active">Expenses</a>
  <a href="categories.html" class="menu-item">Categories</a>
    <a href="report.html" class="menu-item" style="text-decoration: none;">Report</a>

  <div class="menu-bottom">
    <a href="LoginPage.html" class="menu-item logout">Logout</a>
  </div>
</div>

<!-- MAIN -->
<div class="main-content">

<div class="container">

<h1>Expense Overview</h1>
            <br><br><br>


<button class="add-btn" id="openModal">Add Expense</button>

<div class="stats">
  <div class="stat-box">
    <div>Total Expenses</div>
    <div id="totalExpenses">$0</div>
  </div>

  <div class="stat-box">
    <div>Average Expenses</div>
    <div id="avgExpenses">$0</div>
  </div>

  <div class="stat-box">
    <div>Number of Expenses</div>
    <div id="countExpenses">0</div>
  </div>
</div>

<div class="chart-container">
  <canvas id="expenseChart"></canvas>
</div>

<table>
<thead>
<tr>
  <th>Description</th>
  <th>Amount</th>
  <th>Category</th>
  <th>Date</th>
  <th>Actions</th>
</tr>
</thead>
<tbody id="expenseList"></tbody>
</table>

</div>

<!-- SIDEBAR -->
<div class="sidebar">

  <div class="chart-container">
    <canvas id="expensePieChart"></canvas>
  </div>

  <div class="category-box">
    <div class="category-title">Expenses by Category</div>
    <div id="categoryList"></div>
  </div>

</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">

    <input type="hidden" id="editIndex">

    <div class="input-group">
      <input id="description" placeholder="Description">
    </div>

    <div class="input-group">
      <input id="amount" type="number" placeholder="Amount">
    </div>

    <div class="input-group">
      <select id="category">
        <option value="Travel">Travel</option>
        <option value="Transport">Transport</option>
        <option value="Shopping">Shopping</option>
        <option value="Health & Medical">Health & Medical</option>
        <option value="Health & Fitness">Gym & Fitness</option>
        <option value="Food">Food</option>
        <option value="Technology">Technology</option>
        <option value="Bills">Bills</option>
        <option value="Entertainment">Entertainment</option>
      </select>
    </div>

    <div class="input-group">
      <input id="date" type="date">
    </div>

    <button class="submit-btn" id="saveBtn">Add</button>

  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

const modal = document.getElementById("modal");
const openModal = document.getElementById("openModal");
const saveBtn = document.getElementById("saveBtn");

const expenseList = document.getElementById("expenseList");
const editIndex = document.getElementById("editIndex");

const totalExpensesEl = document.getElementById("totalExpenses");
const avgExpensesEl = document.getElementById("avgExpenses");
const countExpensesEl = document.getElementById("countExpenses");
const categoryList = document.getElementById("categoryList");

let rowsData = [];

/* OPEN */
openModal.onclick = () => {
  editIndex.value = "";
  saveBtn.textContent = "Add";
  modal.style.display = "flex";
};

/* CLOSE */
window.onclick = (e) => {
  if (e.target === modal) modal.style.display = "none";
};

/* SAVE */
saveBtn.onclick = () => {

  const description = document.getElementById("description").value;
  const amount = document.getElementById("amount").value;
  const category = document.getElementById("category").value;
  const date = document.getElementById("date").value;

  if (amount < 0) return;
  if (!description || !amount || !category || !date) return;

  const index = editIndex.value;

  if (index === "") {
    rowsData.push({ description, amount, category, date });
  } else {
    rowsData[index] = { description, amount, category, date };
  }

  renderTable();
  updateStats();
  updateChart();
  updateCategoryBox();

  modal.style.display = "none";
};

/* TABLE */
function renderTable() {
  expenseList.innerHTML = "";

  rowsData.forEach((item, index) => {

    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${item.description}</td>
      <td>$${item.amount}</td>
      <td>${item.category}</td>
      <td>${item.date}</td>
      <td>
        <button class="edit-btn">Edit</button>
        <button class="delete-btn">Delete</button>
      </td>
    `;

    row.querySelector(".delete-btn").onclick = () => {
      rowsData.splice(index, 1);
      renderTable();
      updateStats();
      updateChart();
      updateCategoryBox();
    };

    row.querySelector(".edit-btn").onclick = () => {
      document.getElementById("description").value = item.description;
      document.getElementById("amount").value = item.amount;
      document.getElementById("category").value = item.category;
      document.getElementById("date").value = item.date;

      editIndex.value = index;
      saveBtn.textContent = "Save Changes";
      modal.style.display = "flex";
    };

    expenseList.appendChild(row);
  });
}

/* STATS */
function updateStats() {
  const total = rowsData.reduce((s, i) => s + Number(i.amount), 0);
  const count = rowsData.length;
  const avg = count ? total / count : 0;

  totalExpensesEl.textContent = `$${total.toFixed(2)}`;
  avgExpensesEl.textContent = `$${avg.toFixed(2)}`;
  countExpensesEl.textContent = count;
}

/* CHART */
const ctx = document.getElementById("expenseChart");

const chart = new Chart(ctx, {
  data: {
    labels: [],
    datasets: [
      {
        type: "bar",
        data: [],
        backgroundColor: "#ffb26b"
      },
      {
        type: "line",
        data: [],
        borderColor: "#4a90e2",
        fill: true,
        tension: 0.5
      }
    ]
  }
});

function updateChart() {

  const sorted = [...rowsData].sort(
    (a,b) => new Date(a.date) - new Date(b.date)
  );

  chart.data.labels = sorted.map(i => i.description);
  chart.data.datasets[0].data = sorted.map(i => Number(i.amount));
  chart.data.datasets[1].data = sorted.map(i => Number(i.amount));

  chart.update();
}

/* PIE */
const pieChart = new Chart(document.getElementById("expensePieChart"), {
  type: "doughnut",
  data: {
    labels: [],
    datasets: [{
      data: [],
      backgroundColor: ["#4a90e2","#ffb26b","#6fb1ff","#ffd1a6"]
    }]
  }
});

function updateCategoryBox() {

  const map = {};

  rowsData.forEach(i => {
    map[i.category] = (map[i.category] || 0) + Number(i.amount);
  });

  const sorted = Object.entries(map);

  categoryList.innerHTML = "";

  sorted.forEach(([cat, total]) => {
    const row = document.createElement("div");
    row.className = "category-row";
    row.innerHTML = `<span>${cat}</span><span>$${total.toFixed(2)}</span>`;
    categoryList.appendChild(row);
  });

  pieChart.data.labels = sorted.map(i => i[0]);
  pieChart.data.datasets[0].data = sorted.map(i => i[1]);
  pieChart.update();
}

/* INIT */
renderTable();
updateStats();
updateChart();
updateCategoryBox();

/* MENU ACTIVE */
document.querySelectorAll(".menu-item").forEach(item => {
  if (item.getAttribute("href") === window.location.pathname.split("/").pop()) {
    item.classList.add("active");
  }
});

});
</script>

</body>
</html>
